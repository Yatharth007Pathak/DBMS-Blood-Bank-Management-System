<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Donors | Blood Bank</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <header>
    <h1>Blood Donor Management</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="donors.html" class="active">Donors</a>
      <a href="requests.html">Requests</a>
      <a href="blood_stock.html">Blood Stock</a>
      <a href="admin.html">Admin</a>
    </nav>
  </header>

  <main>
    <!-- Register New Donor -->
    <section class="form-section">
      <h2>Register New Donor</h2>
      <form id="donor-form">
        <label>
          Full Name:
          <input name="name" type="text" placeholder="Enter donor name" required>
        </label>

        <label>
          Gender:
          <select id="gender" name="gender" required>
            <option value="">Select</option>
            <option value="M">Male</option>
            <option value="F">Female</option>
            <option value="O">Other</option>
          </select>
        </label>

        <label>
          Age:
          <input name="age" type="number" min="18" max="65" placeholder="18–65" required>
        </label>

        <label>
          Blood Group:
          <select name="blood_group" required>
            <option value="">Select</option>
            <option value="A+">A+</option>
            <option value="A-">A-</option>
            <option value="B+">B+</option>
            <option value="B-">B-</option>
            <option value="O+">O+</option>
            <option value="O-">O-</option>
            <option value="AB+">AB+</option>
            <option value="AB-">AB-</option>
          </select>
        </label>

        <label>
          Phone:
          <input name="phone" type="tel" pattern="[0-9]{10}" maxlength="10" placeholder="10-digit number">
        </label>

        <label>
          Email:
          <input name="email" type="email" placeholder="example@gmail.com">
        </label>

        <label>
          City:
          <input name="city" type="text" placeholder="City">
        </label>

        <label>
          Last Donation Date:
          <input name="last_donation" id="last_donation" type="date">
        </label>

        <button type="submit">Register Donor</button>
      </form>
    </section>

    <!-- Donors Table -->
    <section class="table-section">
      <h2>All Registered Donors</h2>
      <table id="donors-table">
        <thead>
          <tr>
            <th>Donor ID</th>
            <th>Name</th>
            <th>Gender</th>
            <th>Age</th>
            <th>Blood Group</th>
            <th>Phone</th>
            <th>Email</th>
            <th>City</th>
            <th>Last Donation</th>
            <th>Created At</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <!-- Populated dynamically by app.js -->
        </tbody>
      </table>
    </section>
  </main>

  <footer>
    <p>&copy; 2025 Blood Bank Management System</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
